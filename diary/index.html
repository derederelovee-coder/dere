<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리데레 · 일기</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .diary-list { display: flex; flex-direction: column; gap: 10px; }
    .diary-item {
      background: #fff; border-radius: 14px;
      border: 1.5px solid var(--pink-light);
      padding: 16px 20px; cursor: pointer;
      transition: all 0.2s;
    }
    .diary-item:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
    .diary-header { display: flex; align-items: center; gap: 12px; }
    .diary-mood { display: none; }
    .diary-meta { flex: 1; }
    .diary-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .diary-date { font-size: 12px; color: var(--text-soft); margin-top: 2px; }
    .diary-arrow { color: var(--pink-light); font-size: 16px; transition: transform 0.2s; }
    .diary-item.open .diary-arrow { transform: rotate(90deg); }
    .diary-content {
      font-size: 15px; color: var(--pink-dark); line-height: 1.8;
      font-family: 'Nanum Pen Script', cursive; font-size: 20px;
      max-height: 0; overflow: hidden; transition: max-height 0.4s;
      white-space: pre-wrap;
    }
    .diary-item.open .diary-content {
      max-height: 3000px; margin-top: 14px;
      padding-top: 14px; border-top: 1px solid var(--pink-light);
    }
    .post-img { display: block; max-width: 100%; border-radius: 12px; margin-bottom: 12px; border: 1px solid var(--pink-light); }
  </style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="../index.html" class="nav-logo">리데레 🎀</a>
  <a href="../index.html">프로필</a>
  <a href="../notice/">공지</a>
  <a href="../schedule/">일정</a>
  <a href="../work/">업보</a>
  <a href="index.html" class="active">일기</a>
  <a href="../song/">노래책</a>
</div></nav>

<div class="container">
  <div class="page-title">일기</div>
  <div class="page-subtitle">리데레의 방송 일기에요</div>

  <div class="card">
    <div class="diary-list" id="diary-list">
      <div class="spinner"></div>
    </div>
  </div>
  <div class="pagination" id="pagination"></div>
</div>
<footer>© 2026 리데레 팬페이지 ♥</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
  const PAGE_SIZE = 15;
  let allData = [], currentPage = 1;

  async function init() {
    allData = await fetchAll('diary', { order: 'diary_date', asc: false });
    renderPage(1);
  }
  function renderPage(page) {
    currentPage = page;
    const start = (page - 1) * PAGE_SIZE;
    const items = allData.slice(start, start + PAGE_SIZE);
    const el = document.getElementById('diary-list');

    if (!allData.length) {
      el.innerHTML = '<div class="empty">일기가 없어요</div>';
      return;
    }

    el.innerHTML = items.map(d => `
      <div class="diary-item" onclick="this.classList.toggle('open')">
        <div class="diary-header">
          
          <div class="diary-meta">
            <div class="diary-title">${d.title}</div>
            <div class="diary-date">${d.diary_date || ''}</div>
          </div>
          <span class="diary-arrow">›</span>
        </div>
        <div class="diary-content">${d.image_url ? `<img src="${d.image_url}" class="post-img" loading="lazy" alt="">` : ''}${d.content || ''}</div>
      </div>`
    ).join('');

    const totalPages = Math.ceil(allData.length / PAGE_SIZE);
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === page ? ' active' : '');
      btn.textContent = i;
      btn.onclick = () => renderPage(i);
      pg.appendChild(btn);
    }
  }
  init();
</script>
</body>
</html>
