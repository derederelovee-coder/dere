<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리데레 · 방송 일정</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .calendar { background:#fff; border-radius:20px; border:1.5px solid var(--pink-light); box-shadow:var(--shadow); overflow:hidden; }
    .cal-header { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; }
    .cal-title { font-size:20px; font-weight:800; color:var(--text); }
    .cal-nav { width:38px; height:38px; border-radius:50%; border:1.5px solid var(--pink-light); background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--text-mid); transition:all .2s; }
    .cal-nav:hover { background:var(--pink-light); }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); }
    .cal-dow { padding:10px 4px; text-align:center; font-size:13px; font-weight:700; color:var(--pink); }
    .cal-dow:first-child { color:#e05; } .cal-dow:last-child { color:#4a9; }
    .cal-cell { min-height:84px; border-top:1px solid var(--pink-light); border-right:1px solid var(--pink-light); padding:5px 5px 6px; position:relative; }
    .cal-cell:nth-child(7n) { border-right:none; }
    .cal-cell.other { opacity:.35; }
    .cal-cell.today { background:#fff5f8; }
    .cal-cell.today .cal-date { background:var(--pink); color:#fff; border-radius:50%; width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; }
    .cal-date { font-size:13px; font-weight:700; color:var(--text-mid); padding:1px 3px; }
    .cal-cell:nth-child(7n+1) .cal-date { color:#e05; }
    .cal-cell:nth-child(7n) .cal-date { color:#4a9; }
    .ev { font-size:10px; padding:3px 6px; border-radius:6px; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600; }
    .ev.on { background:#d6f0e4; color:#1f7a52; }       /* 방송 */
    .ev.off { background:#ffe0eb; color:#d95f7f; }       /* 휴방 */

    .up-item { display:flex; align-items:center; gap:14px; padding:14px 16px; border-radius:14px; background:#fff; border:1px solid var(--pink-light); margin-bottom:9px; border-left:5px solid var(--pink); }
    .up-item.on { border-left-color:#3fae7e; }
    .up-item.off { border-left-color:#f4a; }
    .up-date { flex-shrink:0; width:84px; }
    .up-d1 { font-size:13px; font-weight:800; color:var(--text); }
    .up-info { flex:1; }
    .up-title { font-size:15px; font-weight:700; color:var(--text); }
    .up-time { font-size:12px; color:var(--text-soft); margin-top:2px; }
    .up-badge { padding:5px 14px; border-radius:999px; font-size:12px; font-weight:700; flex-shrink:0; }
    .up-badge.on { background:#d6f0e4; color:#1f7a52; }
    .up-badge.off { background:#ffe0eb; color:#d95f7f; }
  </style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="../index.html" class="nav-logo">리데레 🎀</a>
  <a href="../index.html">프로필</a>
  <a href="../notice/">공지</a>
  <a href="index.html" class="active">일정</a>
  <a href="../work/">업보</a>
  <a href="../diary/">일기</a>
  <a href="../song/">노래책</a>
</div></nav>

<div class="container">
  <div class="page-title">📅 방송 일정</div>
  <div class="calendar">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <span class="cal-title" id="calTitle"></span>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
  <div class="card">
    <div class="card-title">📋 다가오는 일정</div>
    <div id="upcoming"><div class="spinner"></div></div>
  </div>
</div>
<footer>© 2026 리데레 팬페이지 ♥</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
  let currentYear, currentMonth, allSchedule = [];
  const DAYS = ['일','월','화','수','목','금','토'];
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  // 유형: '휴방'이면 off, 그 외(방송/특별/콜라보/일반)는 on
  function kind(t){ return t === '휴방' ? 'off' : 'on'; }

  async function init() {
    const now = new Date(); currentYear = now.getFullYear(); currentMonth = now.getMonth();
    allSchedule = await fetchAll('schedule', { order: 'date', asc: true });
    renderCalendar(); renderUpcoming();
    enableIframeAutoHeight();
  }
  function changeMonth(d) {
    currentMonth += d;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    renderCalendar(); enableIframeAutoHeight();
  }
  function renderCalendar() {
    document.getElementById('calTitle').textContent = `${currentYear}년 ${currentMonth+1}월`;
    const grid = document.getElementById('calGrid');
    const first = new Date(currentYear, currentMonth, 1);
    const last = new Date(currentYear, currentMonth+1, 0);
    const startDay = first.getDay();
    const today = new Date();
    let html = DAYS.map(d => `<div class="cal-dow">${d}</div>`).join('');
    const prevLast = new Date(currentYear, currentMonth, 0).getDate();
    for (let i = startDay-1; i >= 0; i--) html += `<div class="cal-cell other"><span class="cal-date">${prevLast-i}</span></div>`;
    for (let d = 1; d <= last.getDate(); d++) {
      const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===d;
      const events = allSchedule.filter(s => s.date === dateStr);
      const evHtml = events.map(e => {
        const k = kind(e.type);
        const label = (e.time ? e.time+' ' : '') + (e.title || (k==='off'?'휴방':'방송'));
        return `<div class="ev ${k}" title="${esc(label)}">${esc(label)}</div>`;
      }).join('');
      html += `<div class="cal-cell${isToday?' today':''}"><span class="cal-date">${d}</span>${evHtml}</div>`;
    }
    const totalCells = startDay + last.getDate();
    const rem = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
    for (let i = 1; i <= rem; i++) html += `<div class="cal-cell other"><span class="cal-date">${i}</span></div>`;
    grid.innerHTML = html;
  }
  function renderUpcoming() {
    const today = new Date().toISOString().split('T')[0];
    const upcoming = allSchedule.filter(s => s.date >= today).slice(0, 12);
    const el = document.getElementById('upcoming');
    if (!upcoming.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>다가오는 일정이 없어요</div>'; return; }
    el.innerHTML = upcoming.map(s => {
      const d = new Date(s.date + 'T00:00:00'); const k = kind(s.type);
      const label = k==='off' ? '휴방' : '방송';
      return `<div class="up-item ${k}">
        <div class="up-date"><div class="up-d1">${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} (${DAYS[d.getDay()]})</div></div>
        <div class="up-info"><div class="up-title">${esc(s.title || label)}</div>${s.time?`<div class="up-time">${esc(s.time)}</div>`:''}</div>
        <span class="up-badge ${k}">${label}</span>
      </div>`;
    }).join('');
  }
  init();
</script>
</body>
</html>
