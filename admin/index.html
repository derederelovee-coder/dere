<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔐 리데레 Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .login-overlay { position: fixed; inset: 0; background: var(--pink-bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .login-box { background: var(--pink-card); border-radius: 24px; border: 1.5px solid var(--pink-light); box-shadow: var(--shadow-hover); padding: 40px 36px; text-align: center; width: 320px; }
    .login-title { font-family: 'Nanum Pen Script', cursive; font-size: 32px; color: var(--pink-dark); margin-bottom: 6px; }
    .login-sub { font-size: 13px; color: var(--text-soft); margin-bottom: 24px; }
    .login-err { color: #e05; font-size: 13px; margin-top: 10px; min-height: 20px; }
    .tabs { display: flex; gap: 3px; background: var(--pink-light); border-radius: 14px; padding: 4px; flex-wrap: wrap; }
    .tab-btn { flex: 1; padding: 10px 6px; border: none; background: transparent; border-radius: 10px; font-size: 12px; font-weight: 600; color: var(--text-soft); cursor: pointer; transition: all 0.2s; min-width: 60px; white-space: nowrap; }
    .tab-btn.active { background: #fff; color: var(--pink-dark); box-shadow: var(--shadow); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-grid .full { grid-column: 1 / -1; }
    .delete-btn { background: none; border: none; cursor: pointer; color: #ccc; font-size: 16px; padding: 4px 8px; border-radius: 6px; transition: color 0.2s; }
    .delete-btn:hover { color: #e05; }
    .avatar-preview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--pink-light); display: none; }
  </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-title">🔐 Admin</div>
    <div class="login-sub">관리자 비밀번호를 입력하세요</div>
    <input class="input" type="password" id="pwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter') tryLogin()" style="margin-bottom:10px;text-align:center">
    <button class="btn btn-primary" style="width:100%" onclick="tryLogin()">입장 ♥</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>



<div class="container" id="adminBody" style="display:none">
  <div class="page-title">관리자 페이지</div>
  <div class="page-subtitle">수정 후 저장하면 바로 반영돼요 ♡</div>

  <div class="card" style="padding:6px">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('profile',this)">🎀 프로필</button>
      <button class="tab-btn" onclick="switchTab('notice',this)">📢 공지</button>
      <button class="tab-btn" onclick="switchTab('schedule',this)">📅 일정</button>
      <button class="tab-btn" onclick="switchTab('work',this)">⚡ 업보</button>
      <button class="tab-btn" onclick="switchTab('diary',this)">📝 일기</button>
    </div>
  </div>

  <!-- 프로필 탭 -->
  <div class="tab-panel active" id="tab-profile">
    <div class="card">
      <div class="card-title">🖼 프로필 사진</div>
      <div class="form-field">
        <label class="input-label">이미지 파일 업로드</label>
        <input type="file" id="avatar-file" accept="image/*" class="input" onchange="previewUpload()">
      </div>
      <div style="display:flex;gap:14px;align-items:center;margin-top:12px">
        <img id="avatar-preview" class="avatar-preview">
        <div>
          <div style="font-size:12px;color:var(--text-soft);margin-bottom:8px">파일 선택하면 미리보기</div>
          <button class="btn btn-primary" id="upload-btn" onclick="uploadAvatar()" style="display:none">업로드 & 저장 ♥</button>
          <div id="upload-status" style="font-size:12px;color:var(--pink);margin-top:6px"></div>
        </div>
      </div>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--pink-light)">
        <label class="input-label">또는 SOOP 아이디로 프사 자동 (사진 업로드 안 했을 때 사용)</label>
        <input class="input" id="f-soop-id" type="text" placeholder="rlawkdbs01">
        <div style="font-size:11px;color:var(--text-soft);margin-top:6px">SOOP 아이디만 넣으면 프사가 자동으로 따라와요. 저장 버튼 누르세요.</div>
      </div>
      <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--pink-light)">
        <div style="font-size:11px;color:var(--text-soft);margin-bottom:8px">현재 프로필 사진</div>
        <img id="current-avatar" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--pink-light);display:none">
        <span id="no-avatar" style="font-size:12px;color:var(--text-soft)">없음</span>
        <button class="btn btn-outline" id="delete-avatar-btn" onclick="deleteAvatar()" style="display:none;margin-left:10px;padding:6px 14px;font-size:12px">🗑 사진 삭제</button>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-primary" onclick="saveLocalProfile()">저장 ♥</button></div>
    </div>
    <div class="card">
      <div class="card-title">⭐ 한마디 & 하고픈 말</div>
      <div class="form-field"><label class="input-label">제목 옆 한줄 텍스트</label><input class="input" id="f-head-sub" type="text"></div>
      <div class="form-field"><label class="input-label">오늘의 한마디 (줄바꿈=엔터)</label><textarea class="input" id="f-quote" rows="3"></textarea></div>
      <div class="form-field"><label class="input-label">하고픈 말</label><textarea class="input" id="f-msg" rows="3"></textarea></div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="saveLocalProfile()">저장 ♥</button></div>
    </div>
    <div class="card">
      <div class="card-title">야생의 데레 특징</div>
      <div class="form-field"><label class="input-label">이름</label><input class="input" id="f-info-name" type="text"></div>
      <div class="form-field"><label class="input-label">한마디로</label><input class="input" id="f-info-catchphrase" type="text"></div>
      <div class="form-field"><label class="input-label">성격 태그 (쉼표 구분)</label><input class="input" id="f-info-tags" type="text"></div>
      <div class="form-field"><label class="input-label">MBTI</label><input class="input" id="f-info-mbti" type="text"></div>
      <div class="form-field"><label class="input-label">팬닉</label><input class="input" id="f-info-fandom" type="text"></div>
      <div class="form-field"><label class="input-label">생일/데뷔</label><input class="input" id="f-info-dates" type="text"></div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="saveLocalProfile()">저장 ♥</button></div>
    </div>
    <div class="card">
      <div class="card-title">⭐ 관련 링크</div>
      <div class="form-field"><label class="input-label">SOOP URL</label><input class="input" id="f-link-soop" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">YouTube URL</label><input class="input" id="f-link-youtube" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">Fan Cafe URL</label><input class="input" id="f-link-fancafe" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">Fancim URL</label><input class="input" id="f-link-fancim" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">M Fancim URL</label><input class="input" id="f-link-mfancim" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">♥ 버튼 URL</label><input class="input" id="f-link-heart" type="url" placeholder="https://"></div>
      <div class="form-field"><label class="input-label">코드 버튼 URL</label><input class="input" id="f-link-code" type="url" placeholder="https://"></div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="saveLocalProfile()">저장 ♥</button></div>
    </div>
  </div>

  <!-- 공지 탭 -->
  <div class="tab-panel" id="tab-notice">
    <div class="card">
      <div class="card-title">공지 추가</div>
      <div class="form-field"><label class="input-label">제목 *</label><input class="input" id="noti-title"></div>
      <div class="form-field"><label class="input-label">내용</label><textarea class="input" id="noti-content" rows="4"></textarea></div>
      <div class="form-field"><label class="input-label">이미지 (선택 · 자동 압축됨)</label><input type="file" id="noti-image" accept="image/*" class="input"></div>
      <div class="form-field"><label><input type="checkbox" id="noti-pin"> 📌 고정 공지</label></div>
      <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="addNotice()">+ 추가</button></div>
    </div>
    <div class="card">
      <div class="card-title">등록된 공지</div>
      <div class="table-wrap"><table><thead><tr><th>제목</th><th>고정</th><th>날짜</th><th>삭제</th></tr></thead>
      <tbody id="noti-list"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>
  </div>

  <!-- 일정 탭 -->
  <div class="tab-panel" id="tab-schedule">
    <div class="card">
      <div class="card-title">일정 추가</div>
      <div class="form-grid">
        <div class="form-field full"><label class="input-label">제목 *</label><input class="input" id="sch-title"></div>
        <div class="form-field"><label class="input-label">날짜 *</label><input class="input" id="sch-date" type="date"></div>
        <div class="form-field"><label class="input-label">시간</label><input class="input" id="sch-time" placeholder="오후 8시"></div>
        <div class="form-field"><label class="input-label">유형</label>
          <select class="input" id="sch-type"><option value="일반">일반</option><option value="특별">특별</option><option value="콜라보">콜라보</option><option value="휴방">휴방</option></select>
        </div>
        <div class="form-field"><label class="input-label">메모</label><input class="input" id="sch-note"></div>
        <div class="form-field full" style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="addSchedule()">+ 추가</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">등록된 일정</div>
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>제목</th><th>유형</th><th>삭제</th></tr></thead>
      <tbody id="sch-list"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>
  </div>

  <!-- 업보 탭 -->
  <div class="tab-panel" id="tab-work">
    <style>
      .subtabs { display:flex; gap:6px; margin-bottom:14px; }
      .subtab { padding:9px 16px; border-radius:999px; border:1.5px solid var(--pink-light); background:#fff; color:var(--text-soft); font-size:13px; font-weight:600; cursor:pointer; }
      .subtab.active { background:var(--pink); color:#fff; border-color:var(--pink); }
      .subpanel { display:none; } .subpanel.active { display:block; }
      .vbtn { background:var(--pink-light); color:var(--pink-dark); border:none; padding:5px 12px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; }
      .vbtn:hover { background:var(--pink); color:#fff; }
      .vbtn.del { background:#ffe3ea; color:#e0507a; } .vbtn.del:hover { background:#e0507a; color:#fff; }
      .vrow { display:flex; align-items:center; gap:8px; padding:11px 14px; background:#fff; border:1px solid var(--pink-light); border-radius:12px; margin-bottom:8px; }
      .vrow .vn { flex:1; font-size:14px; font-weight:600; color:var(--text); }
      .vrow .vid { font-size:12px; color:var(--text-soft); }
      .pick { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }
      .pick-item { padding:10px 12px; border:1.5px solid var(--pink-light); border-radius:12px; background:#fff; cursor:pointer; }
      .pick-item.sel { border-color:var(--pink); background:var(--pink-light); }
      .pick-item .pn { font-size:14px; font-weight:700; color:var(--text); }
      .pick-item .pi { font-size:11px; color:var(--text-soft); }
      .counter-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:8px; }
      .counter { display:flex; align-items:center; gap:6px; padding:10px 12px; background:#fff; border:1px solid var(--pink-light); border-radius:12px; }
      .counter .cn { flex:1; font-size:13px; color:var(--text); }
      .counter .cn .evt { font-size:9px; color:#b07d18; background:#fff0d6; padding:1px 6px; border-radius:999px; margin-left:4px; }
      .cbtn { width:26px; height:26px; border-radius:50%; border:1.5px solid var(--pink-light); background:#fff; color:var(--pink-dark); font-weight:700; cursor:pointer; font-size:14px; line-height:1; }
      .cbtn:hover { background:var(--pink); color:#fff; }
      .cval { min-width:26px; text-align:center; font-weight:800; color:var(--pink-dark); }
      .type-row { display:flex; align-items:center; gap:8px; padding:10px 14px; background:#fff; border:1px solid var(--pink-light); border-radius:10px; margin-bottom:7px; }
      .type-cat { font-size:10px; font-weight:700; padding:2px 9px; border-radius:999px; }
      .type-cat.일반 { background:var(--pink-light); color:var(--pink-dark); }
      .type-cat.이벤트 { background:#fff0d6; color:#b07d18; }
      .type-name { flex:1; font-size:14px; color:var(--text); }
    </style>

    <div class="subtabs">
      <button class="subtab active" onclick="switchSub('assign',this)">📋 업보 부여</button>
      <button class="subtab" onclick="switchSub('viewers',this)">👥 시청자 관리</button>
      <button class="subtab" onclick="switchSub('types',this)">🏷 타입 관리</button>
    </div>

    <!-- 업보 부여 -->
    <div class="subpanel active" id="sub-assign">
      <div class="card">
        <div class="card-title">시청자 선택</div>
        <input class="input" id="assign-search" placeholder="🔍 시청자 검색..." style="margin-bottom:12px" oninput="renderPick()">
        <div class="pick" id="pick-list"><div class="spinner"></div></div>
      </div>
      <div class="card" id="assign-card" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="card-title" id="assign-title" style="margin:0">업보 부여</div>
          <button class="btn btn-primary" onclick="saveCounts()">💾 저장</button>
        </div>
        <div class="counter-grid" id="counter-grid"></div>
      </div>
    </div>

    <!-- 시청자 관리 -->
    <div class="subpanel" id="sub-viewers">
      <div class="card">
        <div class="card-title">시청자 추가</div>
        <div class="form-grid">
          <div class="form-field"><label class="input-label">닉네임 *</label><input class="input" id="v-nick" placeholder="닉네임"></div>
          <div class="form-field"><label class="input-label">SOOP 아이디</label><input class="input" id="v-soop" placeholder="user_id"></div>
        </div>
        <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="addViewer()">+ 추가</button></div>
      </div>
      <div class="card">
        <div class="card-title">시청자 목록</div>
        <input class="input" id="v-search" placeholder="🔍 검색..." style="margin-bottom:12px" oninput="renderViewers()">
        <div id="viewer-list"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- 타입 관리 -->
    <div class="subpanel" id="sub-types">
      <div class="card">
        <div class="card-title">업보 타입 추가</div>
        <div class="form-grid">
          <div class="form-field"><label class="input-label">타입명 *</label><input class="input" id="t-name" placeholder="예: 랜덤 단컷"></div>
          <div class="form-field"><label class="input-label">카테고리</label>
            <select class="input" id="t-cat"><option value="일반">일반</option><option value="이벤트">이벤트</option></select>
          </div>
        </div>
        <div style="display:flex;justify-content:flex-end"><button class="btn btn-primary" onclick="addType()">+ 추가</button></div>
      </div>
      <div class="card">
        <div class="card-title">업보 타입 목록</div>
        <div id="type-list"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <!-- 일기 탭 -->
  <div class="tab-panel" id="tab-diary">
    <div class="card">
      <div class="card-title">일기 추가</div>
      <div class="form-grid">
        <div class="form-field"><label class="input-label">제목 *</label><input class="input" id="diary-title"></div>
        <div class="form-field"><label class="input-label">기분 이모지</label>
          <select class="input" id="diary-mood">
            <option>😊</option><option>😄</option><option>🥰</option><option>😢</option>
            <option>😡</option><option>🤔</option><option>😴</option><option>🎉</option>
            <option>💪</option><option>🌸</option>
          </select>
        </div>
        <div class="form-field full"><label class="input-label">내용</label><textarea class="input" id="diary-content" rows="5"></textarea></div>
        <div class="form-field full"><label class="input-label">이미지 (선택 · 자동 압축됨)</label><input type="file" id="diary-image" accept="image/*" class="input"></div>
        <div class="form-field"><label class="input-label">날짜</label><input class="input" id="diary-date" type="date"></div>
        <div class="form-field" style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="addDiary()">+ 추가</button></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">등록된 일기</div>
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>기분</th><th>제목</th><th>삭제</th></tr></thead>
      <tbody id="diary-list"><tr><td colspan="4"><div class="spinner"></div></td></tr></tbody></table></div>
    </div>
  </div>

</div>
<footer>© 2026 리데레 관리자 ♥</footer>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
  const ADMIN_PASSWORD = '1234';

  const profileKeys = [
    'head-sub','quote','msg','soop-id',
    'info-name','info-catchphrase','info-tags','info-mbti','info-fandom','info-dates',
    'link-soop','link-youtube','link-fancafe','link-fancim','link-mfancim','link-heart','link-code'
  ];

  function tryLogin() {
    if (document.getElementById('pwInput').value === ADMIN_PASSWORD) {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('adminBody').style.display = 'flex';
      loadProfileFields();
      loadNotice(); loadSchedule(); loadWork(); loadDiary();
    } else {
      document.getElementById('loginErr').textContent = '비밀번호가 틀렸어요 >﹏<';
    }
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
  }

  // ── 프로필 ──
  async function loadProfileFields() {
    let saved = {};
    try {
      const { data: rows } = await db.from('profile').select('data').eq('id', 1);
      if (rows && rows.length > 0 && rows[0].data) saved = rows[0].data;
    } catch(e) {}
    profileKeys.forEach(k => { const el = document.getElementById('f-' + k); if (el) el.value = saved[k] || ''; });
    showCurrentAvatar(saved.avatar || '');
  }
  async function saveLocalProfile() {
    let saved = {};
    try {
      const { data: rows } = await db.from('profile').select('data').eq('id', 1);
      if (rows && rows.length > 0 && rows[0].data) saved = rows[0].data;
    } catch(e) {}
    profileKeys.forEach(k => { const el = document.getElementById('f-' + k); if (el) saved[k] = el.value; });
    const { error } = await db.from('profile').upsert({ id: 1, data: saved });
    if (error) { showToast('❌ 저장 실패: ' + error.message); return; }
    showToast('✅ 저장됐어요!');
  }
  function showCurrentAvatar(url) {
    const cur = document.getElementById('current-avatar');
    const none = document.getElementById('no-avatar');
    const delBtn = document.getElementById('delete-avatar-btn');
    if (url) {
      cur.src = url; cur.style.display = 'inline-block'; none.style.display = 'none';
      if (delBtn) delBtn.style.display = 'inline-flex';
    } else {
      cur.style.display = 'none'; none.style.display = 'inline';
      if (delBtn) delBtn.style.display = 'none';
    }
  }
  async function deleteAvatar() {
    if (!confirm('프로필 사진을 삭제할까요?\n(삭제하면 SOOP 아이디 프사가 적용돼요)')) return;
    let saved = {};
    try {
      const { data: rows } = await db.from('profile').select('data').eq('id', 1);
      if (rows && rows.length > 0 && rows[0].data) saved = rows[0].data;
    } catch(e) {}
    saved['avatar'] = '';
    const { error } = await db.from('profile').upsert({ id: 1, data: saved });
    if (error) { showToast('❌ 삭제 실패: ' + error.message); return; }
    showCurrentAvatar('');
    showToast('🗑 사진 삭제됨! 이제 SOOP 아이디 프사가 떠요');
  }
  function previewUpload() {
    const file = document.getElementById('avatar-file').files[0];
    if (!file) return;
    document.getElementById('avatar-preview').src = URL.createObjectURL(file);
    document.getElementById('avatar-preview').style.display = 'block';
    document.getElementById('upload-btn').style.display = 'inline-flex';
  }
  async function uploadAvatar() {
    const file = document.getElementById('avatar-file').files[0];
    if (!file) return;
    const status = document.getElementById('upload-status');
    status.textContent = '업로드 중...';
    const ext = file.name.split('.').pop();
    const { data, error } = await db.storage.from('dere').upload('profile.' + ext, file, { upsert: true });
    if (error) { status.textContent = '❌ 업로드 실패: ' + error.message; return; }
    const { data: u } = db.storage.from('dere').getPublicUrl('profile.' + ext);
    const url = u.publicUrl + '?t=' + Date.now();
    let saved = {};
    try {
      const { data: rows } = await db.from('profile').select('data').eq('id', 1);
      if (rows && rows.length > 0 && rows[0].data) saved = rows[0].data;
    } catch(e) {}
    saved['avatar'] = url;
    await db.from('profile').upsert({ id: 1, data: saved });
    showCurrentAvatar(url);
    status.textContent = '✅ 완료!';
    showToast('✅ 프로필 사진 저장!');
  }

  // ── 공지 ──
  async function loadNotice() {
    const data = await fetchAll('notice', { order: 'created_at', asc: false });
    const t = document.getElementById('noti-list');
    if (!data.length) { t.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#ccc;padding:20px">없음</td></tr>'; return; }
    t.innerHTML = data.map(n => `<tr><td>${n.title}</td><td>${n.pinned?'📌':'-'}</td><td>${new Date(n.created_at).toLocaleDateString()}</td><td><button class="delete-btn" onclick="del('notice',${n.id},loadNotice)">🗑</button></td></tr>`).join('');
  }
  async function addNotice() {
    const title = document.getElementById('noti-title').value.trim();
    if (!title) { showToast('❗ 제목 필수!'); return; }
    let image_url = null;
    const imgFile = document.getElementById('noti-image').files[0];
    if (imgFile) { showToast('🖼 이미지 업로드 중...'); image_url = await uploadImage(imgFile, 'notice'); if (!image_url) { showToast('❌ 이미지 업로드 실패'); return; } }
    const ok = await insertRow('notice', { title, content: document.getElementById('noti-content').value, pinned: document.getElementById('noti-pin').checked, image_url });
    if (ok) { showToast('✅ 추가!'); ['noti-title','noti-content','noti-image'].forEach(id=>document.getElementById(id).value=''); document.getElementById('noti-pin').checked=false; loadNotice(); }
    else showToast('❌ 실패');
  }

  // ── 일정 ──
  async function loadSchedule() {
    const data = await fetchAll('schedule', { order: 'date', asc: true });
    const t = document.getElementById('sch-list');
    if (!data.length) { t.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#ccc;padding:20px">없음</td></tr>'; return; }
    t.innerHTML = data.map(s => `<tr><td>${s.date}</td><td>${s.title}</td><td><span class="badge badge-pink">${s.type||'-'}</span></td><td><button class="delete-btn" onclick="del('schedule',${s.id},loadSchedule)">🗑</button></td></tr>`).join('');
  }
  async function addSchedule() {
    const title = document.getElementById('sch-title').value.trim();
    const date = document.getElementById('sch-date').value;
    if (!title||!date) { showToast('❗ 제목/날짜 필수!'); return; }
    const ok = await insertRow('schedule', { title, date, time: document.getElementById('sch-time').value, type: document.getElementById('sch-type').value, note: document.getElementById('sch-note').value });
    if (ok) { showToast('✅ 추가!'); ['sch-title','sch-date','sch-time','sch-note'].forEach(id=>document.getElementById(id).value=''); loadSchedule(); }
    else showToast('❌ 실패');
  }

  // ── 업보 시스템 v2 ──
  let viewers = [], types = [], counts = [];
  let currentViewer = null, editCounts = {};

  function switchSub(name, btn) {
    document.querySelectorAll('.subpanel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.subtab').forEach(b => b.classList.remove('active'));
    document.getElementById('sub-' + name).classList.add('active');
    btn.classList.add('active');
  }

  async function loadWork() {
    [viewers, types, counts] = await Promise.all([
      fetchAll('viewers', { order:'sort_order', asc:true }),
      fetchAll('upbo_types', { order:'sort_order', asc:true }),
      fetchAll('upbo_counts', { order:'id', asc:true })
    ]);
    renderPick(); renderViewers(); renderTypes();
    if (currentViewer) openAssign(currentViewer);
  }

  /* ===== 업보 부여 ===== */
  function renderPick() {
    const q = (document.getElementById('assign-search')?.value || '').trim().toLowerCase();
    const list = viewers.filter(v => (v.nickname||'').toLowerCase().includes(q) || (v.soop_id||'').toLowerCase().includes(q));
    const el = document.getElementById('pick-list');
    if (!viewers.length) { el.innerHTML = '<div style="color:var(--text-soft);font-size:13px">먼저 시청자를 추가하세요</div>'; return; }
    el.innerHTML = list.map(v => `
      <div class="pick-item ${currentViewer===v.id?'sel':''}" onclick="openAssign(${v.id})">
        <div class="pn">${v.nickname}</div>
        <div class="pi">${v.soop_id||'-'}</div>
      </div>`).join('');
  }
  function openAssign(vid) {
    currentViewer = vid;
    const v = viewers.find(x=>x.id===vid);
    if (!v) return;
    editCounts = {};
    counts.filter(c=>c.viewer_id===vid).forEach(c=>{ editCounts[c.type_id]=c.count; });
    document.getElementById('assign-title').textContent = `${v.nickname} 업보 부여`;
    document.getElementById('assign-card').style.display = 'block';
    renderPick();
    if (!types.length) { document.getElementById('counter-grid').innerHTML = '<div style="color:var(--text-soft);font-size:13px">먼저 타입을 추가하세요</div>'; return; }
    document.getElementById('counter-grid').innerHTML = types.map(t => `
      <div class="counter">
        <span class="cn">${t.name}${t.category==='이벤트'?'<span class="evt">이벤트</span>':''}</span>
        <button class="cbtn" onclick="bump(${t.id},-1)">−</button>
        <span class="cval" id="cv-${t.id}">${editCounts[t.id]||0}</span>
        <button class="cbtn" onclick="bump(${t.id},1)">+</button>
      </div>`).join('');
  }
  function bump(tid, d) {
    editCounts[tid] = Math.max(0, (editCounts[tid]||0) + d);
    document.getElementById('cv-'+tid).textContent = editCounts[tid];
  }
  async function saveCounts() {
    if (!currentViewer) return;
    const rows = types.map(t => ({ viewer_id: currentViewer, type_id: t.id, count: editCounts[t.id]||0, updated_at: new Date().toISOString() }));
    const { error } = await db.from('upbo_counts').upsert(rows, { onConflict: 'viewer_id,type_id' });
    if (error) { showToast('❌ 저장 실패: ' + error.message); return; }
    showToast('✅ 저장됐어요!');
    counts = await fetchAll('upbo_counts', { order:'id', asc:true });
  }

  /* ===== 시청자 관리 ===== */
  function renderViewers() {
    const q = (document.getElementById('v-search')?.value || '').trim().toLowerCase();
    const list = viewers.filter(v => (v.nickname||'').toLowerCase().includes(q) || (v.soop_id||'').toLowerCase().includes(q));
    const el = document.getElementById('viewer-list');
    if (!viewers.length) { el.innerHTML = '<div style="color:var(--text-soft);font-size:13px;text-align:center;padding:16px">시청자가 없어요</div>'; return; }
    el.innerHTML = list.map(v => `
      <div class="vrow">
        <span class="vn">${v.nickname}</span>
        <span class="vid">${v.soop_id||'-'}</span>
        <button class="vbtn" onclick="editViewer(${v.id})">수정</button>
        <button class="vbtn del" onclick="delViewer(${v.id})">삭제</button>
      </div>`).join('');
  }
  async function addViewer() {
    const nick = document.getElementById('v-nick').value.trim();
    if (!nick) { showToast('❗ 닉네임 필수!'); return; }
    const maxOrder = viewers.reduce((m,v)=>Math.max(m, v.sort_order||0), 0);
    const ok = await insertRow('viewers', { nickname: nick, soop_id: document.getElementById('v-soop').value.trim(), sort_order: maxOrder+1 });
    if (ok) { showToast('✅ 추가!'); document.getElementById('v-nick').value=''; document.getElementById('v-soop').value=''; loadWork(); }
    else showToast('❌ 실패');
  }
  async function editViewer(id) {
    const v = viewers.find(x=>x.id===id);
    const nick = prompt('닉네임', v.nickname); if (nick===null) return;
    const sid = prompt('SOOP 아이디', v.soop_id||''); if (sid===null) return;
    await updateRow('viewers', id, { nickname: nick.trim(), soop_id: sid.trim() });
    showToast('✅ 수정!'); loadWork();
  }
  async function delViewer(id) {
    if (!confirm('이 시청자를 삭제할까요?\n(업보 기록도 함께 사라져요)')) return;
    await db.from('upbo_counts').delete().eq('viewer_id', id);
    await deleteRow('viewers', id);
    if (currentViewer===id) { currentViewer=null; document.getElementById('assign-card').style.display='none'; }
    showToast('🗑 삭제!'); loadWork();
  }

  /* ===== 타입 관리 ===== */
  function renderTypes() {
    const el = document.getElementById('type-list');
    if (!types.length) { el.innerHTML = '<div style="color:var(--text-soft);font-size:13px;text-align:center;padding:16px">타입이 없어요</div>'; return; }
    el.innerHTML = types.map(t => `
      <div class="type-row">
        <span class="type-cat ${t.category}">${t.category}</span>
        <span class="type-name">${t.name}</span>
        <button class="vbtn" onclick="editType(${t.id})">수정</button>
        <button class="vbtn del" onclick="delType(${t.id})">삭제</button>
      </div>`).join('');
  }
  async function addType() {
    const name = document.getElementById('t-name').value.trim();
    if (!name) { showToast('❗ 타입명 필수!'); return; }
    const maxOrder = types.reduce((m,t)=>Math.max(m, t.sort_order||0), 0);
    const ok = await insertRow('upbo_types', { name, category: document.getElementById('t-cat').value, sort_order: maxOrder+1 });
    if (ok) { showToast('✅ 추가!'); document.getElementById('t-name').value=''; loadWork(); }
    else showToast('❌ 실패');
  }
  async function editType(id) {
    const t = types.find(x=>x.id===id);
    const name = prompt('타입명', t.name); if (name===null) return;
    const cat = prompt('카테고리 (일반 / 이벤트)', t.category); if (cat===null) return;
    await updateRow('upbo_types', id, { name: name.trim(), category: (cat.trim()==='이벤트'?'이벤트':'일반') });
    showToast('✅ 수정!'); loadWork();
  }
  async function delType(id) {
    if (!confirm('이 타입을 삭제할까요?\n(관련 업보 기록도 함께 사라져요)')) return;
    await db.from('upbo_counts').delete().eq('type_id', id);
    await deleteRow('upbo_types', id);
    showToast('🗑 삭제!'); loadWork();
  }

  // ── 일기 ──
  async function loadDiary() {
    const data = await fetchAll('diary', { order: 'diary_date', asc: false });
    const t = document.getElementById('diary-list');
    if (!data.length) { t.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#ccc;padding:20px">없음</td></tr>'; return; }
    t.innerHTML = data.map(d => `<tr><td>${d.diary_date||'-'}</td><td>${d.mood}</td><td>${d.title}</td><td><button class="delete-btn" onclick="del('diary',${d.id},loadDiary)">🗑</button></td></tr>`).join('');
  }
  async function addDiary() {
    const title = document.getElementById('diary-title').value.trim();
    if (!title) { showToast('❗ 제목 필수!'); return; }
    let image_url = null;
    const imgFile = document.getElementById('diary-image').files[0];
    if (imgFile) { showToast('🖼 이미지 업로드 중...'); image_url = await uploadImage(imgFile, 'diary'); if (!image_url) { showToast('❌ 이미지 업로드 실패'); return; } }
    const ok = await insertRow('diary', { title, content: document.getElementById('diary-content').value, mood: document.getElementById('diary-mood').value, diary_date: document.getElementById('diary-date').value, image_url });
    if (ok) { showToast('✅ 추가!'); ['diary-title','diary-content','diary-date','diary-image'].forEach(id=>document.getElementById(id).value=''); loadDiary(); }
    else showToast('❌ 실패');
  }

  async function del(table, id, fn) {
    if (!confirm('정말 삭제?')) return;
    const ok = await deleteRow(table, id);
    if (ok) { showToast('🗑 삭제!'); fn(); } else showToast('❌ 실패');
  }
</script>
</body>
</html>
