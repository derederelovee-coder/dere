<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리데레 · 데레쇼츠</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/kr/krad8243/krad8243.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <style>
    .shorts-head { display:flex; align-items:center; gap:9px; margin-bottom:6px; }
    .shorts-head .t { font-size:22px; font-weight:800; color:var(--pink-dark); }
    .shorts-sub { font-size:13px; color:var(--text-soft); margin-bottom:16px; }
    .shorts-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
    @media (max-width:560px){ .shorts-grid { grid-template-columns:repeat(2,1fr); gap:10px; } }
    .short-card { position:relative; border-radius:16px; overflow:hidden; cursor:pointer; background:#000; aspect-ratio:9/16; border:1.5px solid var(--pink-light); }
    .short-card img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .25s; }
    .short-card:hover img { transform:scale(1.05); }
    .short-play { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,.18); }
    .short-play span { width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,.92); display:flex; align-items:center; justify-content:center; font-size:18px; color:var(--pink-dark); padding-left:3px; }
    .short-title { position:absolute; left:0; right:0; bottom:0; padding:18px 10px 8px; background:linear-gradient(transparent, rgba(0,0,0,.75)); color:#fff; font-size:12px; font-weight:600; line-height:1.3; }
    .short-card iframe { width:100%; height:100%; border:0; display:block; }
    .short-card > div { width:100%; height:100%; }
    .empty { text-align:center; padding:50px 0; color:var(--text-soft); }
    .empty-icon { font-size:40px; margin-bottom:10px; }
    body.dark .short-card { border-color:#3a2f35; }
    /* 쇼츠 재생 모달 (크게 보기) */
    .short-ov { position:absolute; left:0; right:0; background:rgba(0,0,0,.75); display:none; align-items:flex-start; justify-content:center; z-index:600; padding:16px; }
    .short-ov.show { display:flex; }
    .short-modal { position:relative; width:340px; max-width:92vw; aspect-ratio:9/16; background:#000; border-radius:16px; overflow:hidden; box-shadow:0 12px 48px rgba(0,0,0,.5); }
    .short-modal .short-player, .short-modal iframe, .short-modal #yt-target { width:100%; height:100%; border:0; display:block; }
    .short-close { position:absolute; top:-2px; right:8px; color:#fff; font-size:34px; line-height:1; cursor:pointer; z-index:2; text-shadow:0 1px 4px rgba(0,0,0,.6); }
  </style>
</head>
<body>
<nav class="nav"><div class="nav-inner">
  <a href="../index.html" class="nav-logo">RIDERE</a>
  <a href="../index.html">프로필</a>
  <a href="../notice/">공지</a>
  <a href="../schedule/">일정</a>
  <a href="../work/">업보</a>
  <a href="../diary/">일기</a>
  <a href="../song/">노래책</a>
  <a href="index.html" class="active">데레쇼츠</a>
  <button class="theme-switch" id="themeSwitch" type="button" aria-label="다크모드 전환"><span class="knob" id="themeKnob">🌙</span></button>
</div></nav>

<div class="container stagger">
  <div class="card">
    <div class="shorts-head"><span style="font-size:22px">🎬</span><span class="t">데레쇼츠</span></div>
    <div class="shorts-sub">데레의 유튜브 쇼츠 모음! 눌러서 바로 볼 수 있어요</div>
    <div id="shorts-body"><div class="spinner"></div></div>
  </div>
</div>
<footer style="margin-top:-48px; color:#000; font-size:14px; line-height:1.7; text-align:center;">Copyright © 2026 RIDERE Official. All rights reserved.<br>비지니스 문의 - derederelovee@gmail.com</footer>

<div class="short-ov" id="short-ov" onclick="if(event.target===this)closeShort()">
  <div class="short-modal">
    <span class="short-close" onclick="closeShort()">×</span>
    <div class="short-player" id="short-player"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../supabase.js"></script>
<script>
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  // 유튜브 쇼츠/일반 URL 어디서든 영상 ID 추출
  function ytId(url){
    if(!url) return '';
    url = url.trim();
    let m = url.match(/(?:shorts\/|youtu\.be\/|watch\?v=|embed\/|v\/)([A-Za-z0-9_-]{11})/);
    if(m) return m[1];
    m = url.match(/^([A-Za-z0-9_-]{11})$/); // ID만 붙여넣은 경우
    return m ? m[1] : '';
  }

  async function load(){
    let rows = [];
    try { rows = await fetchAll('shorts', { order: 'created_at', asc: false }); } catch(e){ rows = []; }
    const body = document.getElementById('shorts-body');
    const items = (rows||[]).map(r => ({ id:ytId(r.url), title:r.title||'' })).filter(r=>r.id);
    if(!items.length){
      body.innerHTML = '<div class="empty"><div class="empty-icon">🎬</div>아직 쇼츠가 없어요</div>';
      return;
    }
    body.innerHTML = '<div class="shorts-grid">' + items.map(s => `
      <div class="short-card" onclick="playShort('${s.id}')">
        <img src="https://i.ytimg.com/vi/${s.id}/hqdefault.jpg" alt="" loading="lazy">
        <div class="short-play"><span>▶</span></div>
      </div>`).join('') + '</div>';
  }

  // 유튜브 API 로드 (볼륨 조절용)
  let ytApiReady = false;
  const ytQueue = [];
  (function loadYT(){
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  })();
  window.onYouTubeIframeAPIReady = function(){
    ytApiReady = true;
    ytQueue.forEach(fn => fn());
    ytQueue.length = 0;
  };

  let ytPlayer = null;
  function playShort(id){
    const ov = document.getElementById('short-ov');
    const holder = document.getElementById('short-player');
    holder.innerHTML = '<div id="yt-target"></div>';
    // SOOP iframe 대응: 클릭 위치 기준으로 모달 띄우기
    const e = window.event;
    let y = (e && (e.pageY!=null ? e.pageY : e.clientY)) || (window.scrollY||0)+60;
    ov.style.top = Math.max(10, y - 80) + 'px';
    ov.classList.add('show');
    const create = () => {
      ytPlayer = new YT.Player('yt-target', {
        videoId: id,
        playerVars: { autoplay: 1, playsinline: 1 },
        events: { onReady: (ev) => { try { ev.target.setVolume(50); ev.target.playVideo(); } catch(err){} } }
      });
    };
    if (ytApiReady) create();
    else ytQueue.push(create);
  }
  function closeShort(){
    const ov = document.getElementById('short-ov');
    ov.classList.remove('show');
    document.getElementById('short-player').innerHTML = '';
    ytPlayer = null;
  }

  load();
</script>
<script>
(function(){
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  var sw = document.getElementById('themeSwitch');
  var knob = document.getElementById('themeKnob');
  function refresh(){ if(knob) knob.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙'; }
  if (sw) sw.addEventListener('click', function(){
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    refresh();
  });
  refresh();
})();
</script>
</body>
</html>
